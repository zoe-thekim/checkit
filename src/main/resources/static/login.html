<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>checkit login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-wrap {
            max-width: 460px;
            margin: 30px auto;
            background: #fff;
            border: 1px solid #dbe2e8;
            border-radius: 14px;
            padding: 18px;
        }
        .auth-wrap h2 {
            margin-top: 0;
        }
        .auth-form {
            display: grid;
            gap: 8px;
            margin: 10px 0 16px;
        }
        .auth-form input {
            border: 1px solid #dbe2e8;
            border-radius: 9px;
            padding: 10px;
            font-size: 0.97rem;
        }
        .auth-form button {
            border: none;
            border-radius: 9px;
            padding: 11px 12px;
            cursor: pointer;
            color: #fff;
            background: #1c8f75;
        }
        .error {
            color: #c63a3a;
            min-height: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="app">
    <header class="top">
        <h1>checkit</h1>
        <p class="subtitle">Sign in to sync your checklist with the database.</p>
    </header>

    <section class="auth-wrap">
        <h2>Local account login</h2>
        <form id="login-form" class="auth-form">
            <input id="login-username" type="text" placeholder="Username" required>
            <input id="login-password" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <h2>Create local account</h2>
        <form id="register-form" class="auth-form">
            <input id="register-username" type="text" placeholder="Username" required>
            <input id="register-password" type="password" placeholder="Password (min 4 chars)" required>
            <input id="register-email" type="email" placeholder="Email (optional)">
            <button type="submit">Register</button>
        </form>

        <p id="error" class="error"></p>
    </section>
</div>
<script src="login.js"></script>
</body>
</html>
